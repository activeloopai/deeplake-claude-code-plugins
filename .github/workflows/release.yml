name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto-bump version and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.12'

      - name: Check if version was already bumped in this push
        id: check_bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "chore: bump version"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        if: steps.check_bump.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          # Also update plugin.json
          node -e "
            const fs = require('fs');
            const v = '$VERSION';
            // Update plugin.json
            const pf = '.claude-plugin/plugin.json';
            const pd = JSON.parse(fs.readFileSync(pf, 'utf-8'));
            pd.version = v;
            fs.writeFileSync(pf, JSON.stringify(pd, null, 2) + '\n');
            // Update marketplace.json
            const mf = '.claude-plugin/marketplace.json';
            const md = JSON.parse(fs.readFileSync(mf, 'utf-8'));
            if (md.metadata) md.metadata.version = v;
            if (md.plugins) md.plugins.forEach(p => p.version = v);
            fs.writeFileSync(mf, JSON.stringify(md, null, 2) + '\n');
          "
          git add package.json package-lock.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $VERSION"
          git push

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
